server:
  port: 8080

spring:
  application:
    name: taxonomy-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taxonomy}
    username: ${SPRING_DATASOURCE_USERNAME:taxonomy}
    password: ${SPRING_DATASOURCE_PASSWORD:taxonomy_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:taxonomy}
    password: ${SPRING_RABBITMQ_PASSWORD:rabbit_secret}

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  api-key: ${API_KEY:dev-api-key-change-me}
  storage:
    path: ${STORAGE_PATH:./data/uploads}
  allowed-mime-types:
    - application/pdf
    - application/vnd.openxmlformats-officedocument.wordprocessingml.document
    - text/plain
    - text/html
  max-file-size-mb: 50

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
