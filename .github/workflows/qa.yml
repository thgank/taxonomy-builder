name: QA

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api-service:
    name: API Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Maven tests
        run: mvn -B test

      - name: Upload API QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-service-qa-artifacts
          path: |
            api-service/target/surefire-reports
            api-service/target/site/jacoco
          if-no-files-found: warn

  worker-service:
    name: Worker Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: worker-service/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run pytest
        run: |
          mkdir -p reports
          python -m pytest \
            --cov=app \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term \
            --cov-fail-under=70 \
            --junitxml=reports/pytest.xml

      - name: Upload worker QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worker-service-qa-artifacts
          path: |
            worker-service/reports
          if-no-files-found: warn

  web-app:
    name: Web App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app
    env:
      TAXONOMY_API_BASE_URL: http://localhost:8080
      TAXONOMY_API_KEY: dev-api-key-change-me
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: |
          mkdir -p reports
          npm test > reports/test-output.log 2>&1
          cat reports/test-output.log

      - name: Build app
        run: npm run build

      - name: Upload web QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-app-qa-artifacts
          path: |
            web-app/reports
          if-no-files-found: warn
