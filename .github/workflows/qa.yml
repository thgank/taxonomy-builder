name: QA

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api-service:
    name: API Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Maven tests
        run: mvn -B test

      - name: Upload API QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-service-qa-artifacts
          path: |
            api-service/target/surefire-reports
            api-service/target/site/jacoco
          if-no-files-found: warn

  worker-service:
    name: Worker Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: worker-service/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run pytest
        run: |
          mkdir -p reports
          python -m pytest \
            --cov=app \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term \
            --cov-fail-under=90 \
            --junitxml=reports/pytest.xml

      - name: Upload worker QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worker-service-qa-artifacts
          path: |
            worker-service/reports
          if-no-files-found: warn

  web-app:
    name: Web App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app
    env:
      TAXONOMY_API_BASE_URL: http://localhost:8080
      TAXONOMY_API_KEY: dev-api-key-change-me
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: |
          mkdir -p reports
          npm test > reports/test-output.log 2>&1
          cat reports/test-output.log

      - name: Run coverage gate
        run: npm run test:coverage:ci

      - name: Build app
        run: npm run build

      - name: Upload web QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-app-qa-artifacts
          path: |
            web-app/reports
          if-no-files-found: warn

  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start infrastructure
        run: docker compose -f docker-compose.dev.yml up -d

      - name: Wait for infrastructure health
        run: |
          for attempt in $(seq 1 60); do
            pg_status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}unknown{{end}}' taxonomy-postgres-dev)"
            rabbit_status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}unknown{{end}}' taxonomy-rabbitmq-dev)"
            echo "Attempt ${attempt}: postgres=${pg_status} rabbitmq=${rabbit_status}"
            if [ "${pg_status}" = "healthy" ] && [ "${rabbit_status}" = "healthy" ]; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.dev.yml logs postgres rabbitmq
          exit 1

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Start API service
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/taxonomy
          SPRING_DATASOURCE_USERNAME: taxonomy
          SPRING_DATASOURCE_PASSWORD: taxonomy_secret
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_PORT: 5672
          SPRING_RABBITMQ_USERNAME: taxonomy
          SPRING_RABBITMQ_PASSWORD: rabbit_secret
          API_KEY: dev-api-key-change-me
        run: |
          mkdir -p qa/e2e-results
          nohup mvn -B -f api-service/pom.xml -DskipTests spring-boot:run > qa/e2e-results/api-service.log 2>&1 &
          echo $! > qa/e2e-results/api-service.pid

      - name: Wait for API
        run: |
          for attempt in $(seq 1 120); do
            if [ -f qa/e2e-results/api-service.pid ] && ! kill -0 "$(cat qa/e2e-results/api-service.pid)" 2>/dev/null; then
              echo "API process exited before health check succeeded"
              cat qa/e2e-results/api-service.log
              exit 1
            fi
            status_code="$(curl -sS -o qa/e2e-results/health.json -w '%{http_code}' http://localhost:8080/actuator/health || true)"
            if [ "${status_code}" = "200" ]; then
              exit 0
            fi
            if [ -s qa/e2e-results/health.json ]; then
              echo "Attempt ${attempt}: /actuator/health returned HTTP ${status_code}"
              cat qa/e2e-results/health.json
            else
              echo "Attempt ${attempt}: /actuator/health not reachable yet"
            fi
            sleep 2
          done
          echo "API health check timed out"
          if [ -s qa/e2e-results/health.json ]; then
            cat qa/e2e-results/health.json
          fi
          cat qa/e2e-results/api-service.log
          exit 1

      - name: Run core API smoke
        run: |
          docker run --rm --add-host host.docker.internal:host-gateway -i \
            -v "$PWD:/work" -w /work grafana/k6 run \
            -e BASE_URL=http://host.docker.internal:8080 \
            -e API_KEY=dev-api-key-change-me \
            -e RUN_JOB=true \
            qa/k6/core-api-smoke.js | tee qa/e2e-results/core-api-smoke.log

      - name: Run auth negative smoke
        run: |
          docker run --rm --add-host host.docker.internal:host-gateway -i \
            -v "$PWD:/work" -w /work grafana/k6 run \
            -e BASE_URL=http://host.docker.internal:8080 \
            qa/k6/auth-negative-smoke.js | tee qa/e2e-results/auth-negative-smoke.log

      - name: Seed k6 load context
        env:
          API_KEY: dev-api-key-change-me
        run: |
          collection_response="$(curl -fsS -X POST http://localhost:8080/api/collections \
            -H "X-API-Key: ${API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"name":"qa-k6-load-seed","description":"Seed collection for CI k6 runs"}')"
          collection_id="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])' <<<"${collection_response}")"

          job_response="$(curl -fsS -X POST http://localhost:8080/api/collections/${collection_id}/jobs \
            -H "X-API-Key: ${API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"type":"FULL_PIPELINE","params":{"method_term_extraction":"both","method_taxonomy":"hybrid","max_terms":120,"min_freq":1,"similarity_threshold":0.55,"chunk_size":1000,"max_depth":6}}')"
          job_row="$(docker exec taxonomy-postgres-dev psql -U taxonomy -d taxonomy -At -F '|' -c \"SELECT id, COALESCE(taxonomy_version_id::text, '') FROM jobs WHERE collection_id = '${collection_id}' ORDER BY created_at DESC LIMIT 1;\")"
          job_id="${job_row%%|*}"
          taxonomy_id="${job_row#*|}"

          echo "JOB_ID=${job_id}" >> "$GITHUB_ENV"
          echo "TAXONOMY_ID=${taxonomy_id}" >> "$GITHUB_ENV"

      - name: Run collections browse load
        run: |
          docker run --rm --add-host host.docker.internal:host-gateway -i \
            -v "$PWD:/work" -w /work grafana/k6 run \
            -e BASE_URL=http://host.docker.internal:8080 \
            -e API_KEY=dev-api-key-change-me \
            -e VUS=8 \
            -e DURATION=30s \
            -e SLEEP_SECONDS=0.25 \
            -e MAX_FAILED_RATE=0.05 \
            -e P95_MS=1200 \
            qa/k6/collections-browse-load.js | tee qa/e2e-results/collections-browse-load.log

      - name: Run job status load
        run: |
          docker run --rm --add-host host.docker.internal:host-gateway -i \
            -v "$PWD:/work" -w /work grafana/k6 run \
            -e BASE_URL=http://host.docker.internal:8080 \
            -e API_KEY=dev-api-key-change-me \
            -e JOB_ID="${JOB_ID}" \
            -e TAXONOMY_ID="${TAXONOMY_ID}" \
            -e VUS=8 \
            -e DURATION=45s \
            -e SLEEP_SECONDS=0.25 \
            -e MAX_FAILED_RATE=0.05 \
            -e P95_MS=1000 \
            qa/k6/job-status-load.js | tee qa/e2e-results/job-status-load.log

      - name: Run job create burst
        run: |
          docker run --rm --add-host host.docker.internal:host-gateway -i \
            -v "$PWD:/work" -w /work grafana/k6 run \
            -e BASE_URL=http://host.docker.internal:8080 \
            -e API_KEY=dev-api-key-change-me \
            -e VUS=4 \
            -e ITERATIONS=4 \
            -e MAX_DURATION=60s \
            -e SLEEP_SECONDS=0.25 \
            -e MAX_FAILED_RATE=0.15 \
            -e P95_MS=1800 \
            qa/k6/job-create-burst.js | tee qa/e2e-results/job-create-burst.log

      - name: Run mixed workflow load
        run: |
          docker run --rm --add-host host.docker.internal:host-gateway -i \
            -v "$PWD:/work" -w /work grafana/k6 run \
            -e BASE_URL=http://host.docker.internal:8080 \
            -e API_KEY=dev-api-key-change-me \
            -e JOB_ID="${JOB_ID}" \
            -e TAXONOMY_ID="${TAXONOMY_ID}" \
            -e VUS=10 \
            -e DURATION=45s \
            -e SLEEP_SECONDS=0.25 \
            -e MAX_FAILED_RATE=0.08 \
            -e P95_MS=1800 \
            qa/k6/mixed-workflow-load.js | tee qa/e2e-results/mixed-workflow-load.log

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-artifacts
          path: |
            qa/e2e-results
          if-no-files-found: warn

      - name: Stop services
        if: always()
        run: |
          if [ -f qa/e2e-results/api-service.pid ]; then
            kill "$(cat qa/e2e-results/api-service.pid)" || true
          fi
          docker compose -f docker-compose.dev.yml down -v
