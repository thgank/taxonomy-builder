name: QA

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api-service:
    name: API Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Maven tests
        run: mvn -B test

      - name: Upload API QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-service-qa-artifacts
          path: |
            api-service/target/surefire-reports
            api-service/target/site/jacoco
          if-no-files-found: warn

  worker-service:
    name: Worker Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: worker-service/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run pytest
        run: |
          mkdir -p reports
          python -m pytest \
            --cov=app \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term \
            --cov-fail-under=90 \
            --junitxml=reports/pytest.xml

      - name: Upload worker QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worker-service-qa-artifacts
          path: |
            worker-service/reports
          if-no-files-found: warn

  web-app:
    name: Web App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app
    env:
      TAXONOMY_API_BASE_URL: http://localhost:8080
      TAXONOMY_API_KEY: dev-api-key-change-me
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: |
          mkdir -p reports
          npm test > reports/test-output.log 2>&1
          cat reports/test-output.log

      - name: Run coverage gate
        run: npm run test:coverage:ci

      - name: Build app
        run: npm run build

      - name: Upload web QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-app-qa-artifacts
          path: |
            web-app/reports
          if-no-files-found: warn

  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start infrastructure
        run: docker compose -f docker-compose.dev.yml up -d

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Start API service
        working-directory: api-service
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/taxonomy
          SPRING_DATASOURCE_USERNAME: taxonomy
          SPRING_DATASOURCE_PASSWORD: taxonomy_secret
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_PORT: 5672
          SPRING_RABBITMQ_USERNAME: taxonomy
          SPRING_RABBITMQ_PASSWORD: rabbit_secret
          API_KEY: dev-api-key-change-me
        run: |
          mkdir -p ../qa/e2e-results
          nohup ./mvnw -q spring-boot:run > ../qa/e2e-results/api-service.log 2>&1 &
          echo $! > ../qa/e2e-results/api-service.pid

      - name: Wait for API
        run: |
          for attempt in $(seq 1 60); do
            if curl -fsS http://localhost:8080/actuator/health > qa/e2e-results/health.json; then
              exit 0
            fi
            sleep 2
          done
          cat qa/e2e-results/api-service.log
          exit 1

      - name: Run core API smoke
        run: |
          docker run --rm --add-host host.docker.internal:host-gateway -i \
            -v "$PWD:/work" -w /work grafana/k6 run \
            -e BASE_URL=http://host.docker.internal:8080 \
            -e API_KEY=dev-api-key-change-me \
            -e RUN_JOB=true \
            qa/k6/core-api-smoke.js | tee qa/e2e-results/core-api-smoke.log

      - name: Run auth negative smoke
        run: |
          docker run --rm --add-host host.docker.internal:host-gateway -i \
            -v "$PWD:/work" -w /work grafana/k6 run \
            -e BASE_URL=http://host.docker.internal:8080 \
            qa/k6/auth-negative-smoke.js | tee qa/e2e-results/auth-negative-smoke.log

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-artifacts
          path: |
            qa/e2e-results
          if-no-files-found: warn

      - name: Stop services
        if: always()
        run: |
          if [ -f qa/e2e-results/api-service.pid ]; then
            kill "$(cat qa/e2e-results/api-service.pid)" || true
          fi
          docker compose -f docker-compose.dev.yml down -v
